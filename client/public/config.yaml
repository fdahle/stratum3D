# =====================================================================
#  HIST MAP — Configuration File
# =====================================================================
#
# Sections:
#   1. website         — Page title, favicon, search defaults
#   2. view            — Initial map center, zoom, extent constraints
#   3. crs             — Coordinate Reference System (EPSG code)
#   4. base_layers     — Background map tiles (one visible at a time)
#   5. overlay_layers  — Data layers (GeoJSON, GeoTIFF) rendered on top
#
# Rules:
#   - Exactly ONE base layer must have `visible: true`.
#   - Layer orders within base_layers / overlay_layers must be unique.
#   - For a full configuration reference see: examples/config_london.yaml
# =====================================================================

# --- 1. Website ---
website:
  title: "Hist Map"
  favicon: "/vite.svg"
  search:
    placeholder: "Search..."
    defaultQuery: ""

# --- 2. Map View ---
view:
  center: [-2000000, 1000000]   # map centre in projected coordinates
  zoom: 7
  extent: [-4194304, -4194304, 4194304, 4194304]
  minZoom: 0
  maxZoom: 16

# --- 3. Coordinate Reference System ---
# Use any EPSG code. Add projection_params for non-standard CRS.
crs: "EPSG:3031"
projection_params:
  proj_string: "+proj=stere +lat_0=-90 +lat_ts=-71 +lon_0=0 +k=1 +x_0=0 +y_0=0 +datum=WGS84 +units=m +no_defs"
  extent: [-12367396.2185, -12367396.2185, 12367396.2185, 12367396.2185]

# --- 4. Base Layers ---
#
# YAML anchor: define the GBIF tile grid once and reuse it with `*gbif_3031`.
# GBIF tile resolutions reference: https://tile.gbif.org/ui/
#
base_layers:

  - name: "OSM"
    type: "tile"
    url: "https://tile.gbif.org/3031/omt/{z}/{x}/{y}@1x.png?style=osm-bright-en"
    visible: true
    order: 0
    tileSize: 512
    attribution: "© OpenStreetMap contributors"
    crs_options: &gbif_3031
      extent: [-12367396.2185, -12367396.2185, 12367396.2185, 12367396.2185]
      resolutions: [67733.469, 33866.734, 16933.367, 8466.684, 4233.342, 2116.671, 1058.335, 529.168, 264.584, 132.292]

  - name: "Geyser"
    type: "tile"
    url: "https://tile.gbif.org/3031/omt/{z}/{x}/{y}@1x.png?style=gbif-geyser"
    visible: false
    order: 1
    tileSize: 512
    attribution: "© GBIF, OpenStreetMap contributors"
    crs_options: *gbif_3031

  - name: "Classic"
    type: "tile"
    url: "https://tile.gbif.org/3031/omt/{z}/{x}/{y}@1x.png?style=gbif-classic"
    visible: false
    order: 2
    tileSize: 512
    attribution: "© GBIF, OpenStreetMap contributors"
    crs_options: *gbif_3031

  - name: "MODIS"
    type: "wmts"
    url: "https://gibs-{a-c}.earthdata.nasa.gov/wmts/epsg3031/best/wmts.cgi?TIME=2013-12-01"
    layer: "MODIS_Terra_CorrectedReflectance_TrueColor"
    matrixSet: "250m"
    format: "image/jpeg"
    visible: false
    order: 3
    attribution: "NASA Global Imagery Browse Services (GIBS)"
    crs_options:
      extent: [-4194304, -4194304, 4194304, 4194304]
      resolutions: [16384, 8192, 4096, 2048, 1024, 512, 256, 128, 64]

  # ⚠ Sentinel-2 (matrixSet "WGS84") does not support EPSG:3031.
  #   The map will detect this automatically and mark the layer as unavailable.
  - name: "Sentinel-2"
    type: "wmts"
    url: "https://tiles.maps.eox.at/wmts/1.0.0/"
    layer: "s2cloudless-2020"
    style: "default"
    matrixSet: "WGS84"
    format: "image/jpeg"
    visible: false
    order: 4
    attribution: "Sentinel-2 cloudless by EOX IT Services GmbH (Contains modified Copernicus Sentinel data 2020)"

  # WMS layers cannot be probed from the browser due to CORS restrictions.
  # Set `crs_support: false` to explicitly mark a layer as incompatible.
  - name: "ESRI"
    type: "wms"
    url: "https://services.arcgisonline.com/arcgis/services/World_Imagery/MapServer/WMSServer"
    layers: "0"
    format: "image/jpeg"
    version: "1.3.0"
    transparent: false
    visible: false
    order: 5
    crs_support: false
    attribution: "Esri, Maxar, Earthstar Geographics, CNES/Airbus DS, USGS, AeroGRID, IGN, and the GIS User Community"

# --- 5. Overlay Layers ---
overlay_layers:

  - name: "Approx Images"
    type: "geojson"
    url: "http://localhost:3000/data/shapes/approx_images.geojson"
    visible: true
    color: "#ff0000"       # UI badge color
    stroke_color: "#ff0000"
    fill_color: "none"     # no fill — outline only
    render_mode: "image"   # VectorImageLayer: faster for large feature counts
    search_fields: ["image_id"]
    group_by: "direction"  # sub-group each unique value separately

  - name: "Georef Sat"
    type: "geojson"
    url: "http://localhost:3000/data/shapes/georef_sat.geojson"
    visible: true
    color: "#ff6600"
    search_fields: ["image_id"]

  - name: "Research Stations"
    type: "geojson"
    url: "http://localhost:3000/data/shapes/stations.geojson"
    visible: true
    color: "#0066ff"
    pointType: "circle"
    search_fields: ["id", "station_name"]

  - name: "Glaciers"
    type: "geojson"
    url: "http://localhost:3000/data/shapes/glaciers.geojson"
    visible: false
    color: "#00ccff"
    search_fields: ["glac_name"]

  - name: "TMA Flight Lines"
    type: "geojson"
    url: "http://localhost:3000/data/shapes/tma_lines.geojson"
    visible: true
    color: "#33cc33"
    search_fields: ["tma_num"]
