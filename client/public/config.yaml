# ==========================================
#  HIST MAP — Main Configuration File
# ==========================================
# This is the SINGLE configuration file for your Hist Map instance.
# All user-facing settings are controlled here.
#
# Sections:
#   1. website    — Page title, favicon, search defaults
#   2. view       — Initial map center, zoom, extent constraints
#   3. crs        — Coordinate Reference System (EPSG code + optional custom projection)
#   4. base_layers    — Background map tiles (only one visible at a time)
#   5. overlay_layers — Data layers (GeoJSON, GeoTIFF) rendered on top
#
# For a full example see: examples/config_london.yaml
# ==========================================

# Website settings (title and favicon). Place favicon file in the `public/` folder
# Example: favicon: "/favicon.ico" or "/assets/my-favicon.png"
website:
  title: "Hist Map"
  favicon: "/vite.svg"
  search:
    placeholder: "Search..."
    defaultQuery: ""

# 1. Map View Settings
view:
  center: [-2000000, 1000000] # [Longitude, Latitude] format - South Pole
  zoom: 7
  extent: [-4194304, -4194304, 4194304, 4194304] # extent for the view
  minZoom: 0
  maxZoom: 16

# 2. Coordinate Reference System
crs: "EPSG:3031"
projection_params:
  proj_string: "+proj=stere +lat_0=-90 +lat_ts=-71 +lon_0=0 +k=1 +x_0=0 +y_0=0 +datum=WGS84 +units=m +no_defs"
  extent: [-12367396.2185, -12367396.2185, 12367396.2185, 12367396.2185]

# 3. Base Map Layers (Using GBIF Polar Tiles)
# GBIF tile resolutions for EPSG:3031: https://tile.gbif.org/ui/
base_layers:
  - name: "OSM"
    type: "tile"
    url: "https://tile.gbif.org/3031/omt/{z}/{x}/{y}@1x.png?style=osm-bright-en"
    visible: true
    order: 0
    tileSize: 512
    attribution: "© OpenStreetMap contributors"
    crs_options:
      extent: [-12367396.2185, -12367396.2185, 12367396.2185, 12367396.2185] # projection extent
      resolutions:
        [
          67733.46880027094,
          33866.73440013547,
          16933.367200067736,
          8466.683600033868,
          4233.341800016934,
          2116.670900008467,
          1058.3354500042335,
          529.1677250021167,
          264.5838625010584,
          132.2919312505292,
        ]

  - name: "MODIS"
    type: "wmts"
    url: "https://gibs-{a-c}.earthdata.nasa.gov/wmts/epsg3031/best/wmts.cgi?TIME=2013-12-01"
    layer: "MODIS_Terra_CorrectedReflectance_TrueColor"
    matrixSet: "250m"
    format: "image/jpeg"
    visible: false
    order: 1
    attribution: "NASA Global Imagery Browse Services (GIBS)"
    crs_options:
      extent: [-4194304, -4194304, 4194304, 4194304]
      resolutions: [16384, 8192, 4096, 2048, 1024, 512, 256, 128, 64]

  - name: "Sentinel-2"
    type: "wmts"
    url: "https://tiles.maps.eox.at/wmts/1.0.0/"
    layer: "s2cloudless-2020"    # Note: Removed "_3857" suffix
    style: "default"
    matrixSet: "WGS84"           # Note: Changed from GoogleMapsCompatible
    format: "image/jpeg"
    visible: false
    order: 4
    attribution: "Sentinel-2 cloudless by EOX IT Services GmbH (Contains modified Copernicus Sentinel data 2020)"

  - name: "ESRI"
    type: "wms"
    url: "https://services.arcgisonline.com/arcgis/services/World_Imagery/MapServer/WMSServer"
    layers: "0"
    format: "image/jpeg"
    version: "1.3.0"
    transparent: false
    visible: false
    order: 5
    attribution: "Esri, Maxar, Earthstar Geographics, CNES/Airbus DS, USGS, AeroGRID, IGN, and the GIS User Community"

  - name: "Geyser"
    type: "tile"
    url: "https://tile.gbif.org/3031/omt/{z}/{x}/{y}@1x.png?style=gbif-geyser"
    visible: false
    order: 2
    tileSize: 512
    attribution: "© GBIF, OpenStreetMap contributors"
    crs_options:
      extent: [-12367396.2185, -12367396.2185, 12367396.2185, 12367396.2185]
      resolutions:
        [
          67733.46880027094,
          33866.73440013547,
          16933.367200067736,
          8466.683600033868,
          4233.341800016934,
          2116.670900008467,
          1058.3354500042335,
          529.1677250021167,
          264.5838625010584,
          132.2919312505292,
        ]

  - name: "Classic"
    type: "tile"
    url: "https://tile.gbif.org/3031/omt/{z}/{x}/{y}@1x.png?style=gbif-classic"
    visible: false
    order: 3
    tileSize: 512
    attribution: "© GBIF, OpenStreetMap contributors"
    crs_options:
      extent: [-12367396.2185, -12367396.2185, 12367396.2185, 12367396.2185]
      resolutions:
        [
          67733.46880027094,
          33866.73440013547,
          16933.367200067736,
          8466.683600033868,
          4233.341800016934,
          2116.670900008467,
          1058.3354500042335,
          529.1677250021167,
          264.5838625010584,
          132.2919312505292,
        ]

# 4. Overlay Layers
overlay_layers:
  - name: "Georef Sat"
    type: "geojson"
    url: "http://localhost:3000/data/layers/georef_sat.geojson"
    visible: true
    color: "#ff6600"
    search_fields: ["image_id"]
  - name: "Research Stations"
    type: "geojson"
    url: "http://localhost:3000/data/layers/stations.geojson"
    visible: true
    color: "#0066ff"
    pointType: "circle"
    search_fields: ["id", "station_name"]
  - name: "Glaciers"
    type: "geojson"
    url: "http://localhost:3000/data/layers/glaciers.geojson"
    visible: false
    color: "#00ccff"
    search_fields: ["glac_name"]
  - name: "TMA Flight Lines"
    type: "geojson"
    url: "http://localhost:3000/data/layers/tma_lines.geojson"
    visible: true
    color: "#33cc33"
    search_fields: ["tma_num"]