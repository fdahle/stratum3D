version: '3.8'

services:
  # Backend server with preprocessing capabilities
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: hist_map_server
    ports:
      - "3000:3000"
    volumes:
      # Mount input folder for preprocessing
      - ./input:/app/input:ro
      # Mount data folder to persist processed files
      - ./server/data:/app/server/data
      # Mount server code for development (optional - remove for production)
      - ./server:/app/server
      - /app/server/node_modules
    environment:
      - NODE_ENV=development
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-changeme}
    command: node index.js
    networks:
      - hist_map_network

  # Frontend client (production build with nginx)
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: hist_map_client
    ports:
      - "8080:80"
    depends_on:
      - server
    networks:
      - hist_map_network

  # Alternative: Development mode for client (hot reload)
  client-dev:
    image: node:20-alpine
    container_name: hist_map_client_dev
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev -- --host"
    profiles:
      - dev
    networks:
      - hist_map_network

networks:
  hist_map_network:
    driver: bridge
